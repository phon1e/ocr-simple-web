<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typhoon OCR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0b0c0f;
            --surface: #13151a;
            --surface2: #1c1f27;
            --border: #272b36;
            --accent: #e8f65a;
            --accent2: #5af6c8;
            --text: #eceef2;
            --muted: #6b7280;
            --danger: #ff5f57;
            --radius: 12px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 24px 80px;
            position: relative;
            overflow-x: hidden;
        }

        /* Background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(232, 246, 90, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(232, 246, 90, 0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* Glow orbs */
        body::after {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(232, 246, 90, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 720px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeUp 0.6s ease both;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(232, 246, 90, 0.08);
            border: 1px solid rgba(232, 246, 90, 0.2);
            border-radius: 100px;
            padding: 5px 14px;
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            color: var(--accent);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s ease infinite;
        }

        h1 {
            font-size: clamp(36px, 6vw, 56px);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.03em;
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            margin-top: 12px;
            color: var(--muted);
            font-size: 15px;
            font-weight: 400;
            font-family: 'DM Mono', monospace;
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 20px;
            animation: fadeUp 0.6s ease both;
        }

        .card:nth-child(2) {
            animation-delay: 0.1s;
        }

        .card:nth-child(3) {
            animation-delay: 0.2s;
        }

        .card-label {
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        /* API Key input */
        .input-wrap {
            position: relative;
        }

        .input-wrap svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            padding: 14px 48px 14px 44px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            letter-spacing: 0.03em;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232, 246, 90, 0.08);
        }

        .toggle-eye {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            padding: 4px;
            transition: color 0.2s;
        }

        .toggle-eye:hover {
            color: var(--text);
        }

        /* Drop zone */
        .dropzone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s, transform 0.15s;
            position: relative;
            overflow: hidden;
        }

        .dropzone:hover,
        .dropzone.dragover {
            border-color: var(--accent);
            background: rgba(232, 246, 90, 0.04);
        }

        .dropzone.dragover {
            transform: scale(1.01);
        }

        .dropzone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .drop-icon {
            width: 48px;
            height: 48px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            color: var(--accent);
            transition: transform 0.2s;
        }

        .dropzone:hover .drop-icon {
            transform: translateY(-3px);
        }

        .drop-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .drop-sub {
            font-size: 12px;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
        }

        .file-selected {
            display: none;
            align-items: center;
            gap: 12px;
            background: var(--surface2);
            border: 1px solid rgba(90, 246, 200, 0.2);
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 16px;
            animation: fadeUp 0.3s ease;
        }

        .file-selected.show {
            display: flex;
        }

        .file-icon {
            width: 36px;
            height: 36px;
            background: rgba(90, 246, 200, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent2);
            flex-shrink: 0;
        }

        .file-name {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-size {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
        }

        /* Button */
        .btn-run {
            width: 100%;
            background: var(--accent);
            color: #0b0c0f;
            border: none;
            border-radius: var(--radius);
            padding: 16px 24px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
            margin-top: 20px;
            animation: fadeUp 0.6s 0.3s ease both;
        }

        .btn-run:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(232, 246, 90, 0.25);
        }

        .btn-run:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-run:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-run .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-top-color: #0b0c0f;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .btn-run.loading .spinner {
            display: block;
        }

        .btn-run.loading .btn-text {
            opacity: 0.7;
        }

        /* Output */
        .output-section {
            display: none;
            animation: fadeUp 0.4s ease both;
        }

        .output-section.show {
            display: block;
        }

        .output-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .output-title {
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .output-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent2);
            box-shadow: 0 0 8px var(--accent2);
        }

        .copy-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 8px;
            padding: 6px 14px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn:hover {
            color: var(--text);
            border-color: var(--muted);
        }

        .copy-btn.copied {
            color: var(--accent2);
            border-color: var(--accent2);
        }

        .output-box {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            font-family: 'DM Mono', monospace;
            font-size: 12.5px;
            line-height: 1.8;
            color: var(--text);
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 480px;
            overflow-y: auto;
        }

        .output-box::-webkit-scrollbar {
            width: 6px;
        }

        .output-box::-webkit-scrollbar-track {
            background: transparent;
        }

        .output-box::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .output-box.error {
            border-color: rgba(255, 95, 87, 0.3);
            color: var(--danger);
        }

        /* Char count */
        .stats-row {
            display: flex;
            gap: 16px;
            margin-top: 10px;
        }

        .stat {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .stat span {
            color: var(--accent);
        }

        /* Animations */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="badge">Typhoon OCR · v1</div>
            <h1>Extract <span>Text</span><br>from Anything</h1>
            <p class="subtitle">// powered by typhoon-ocr model</p>
        </div>

        <!-- API Key -->
        <div class="card">
            <div class="card-label">01 — API Key</div>
            <div class="input-wrap">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />
                </svg>
                <input type="password" id="apiKey" placeholder="sk-···············" autocomplete="off" />
                <button class="toggle-eye" onclick="toggleKey()" title="Show/hide key">
                    <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- File Upload -->
        <div class="card">
            <div class="card-label">02 — Upload File</div>
            <div class="dropzone" id="dropzone">
                <input type="file" id="imageInput" accept="image/*,.pdf" onchange="onFileChange(this)" />
                <div class="drop-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                </div>
                <div class="drop-title">Drop file here or click to browse</div>
                <div class="drop-sub">Supports images (PNG, JPG, WEBP) and PDF</div>
            </div>

            <div class="file-selected" id="fileSelected">
                <div class="file-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                    </svg>
                </div>
                <div>
                    <div class="file-name" id="fileName">—</div>
                    <div class="file-size" id="fileSize">—</div>
                </div>
            </div>
        </div>

        <!-- Run -->
        <button class="btn-run" id="runBtn" onclick="run()">
            <div class="spinner"></div>
            <span class="btn-text">Extract Text</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />
            </svg>
        </button>

        <!-- Output -->
        <div class="output-section" id="outputSection">
            <div class="card" style="margin-top: 20px; padding-bottom: 24px;">
                <div class="output-header">
                    <div class="output-title">
                        <div class="output-dot" id="outputDot"></div>
                        Extracted Text
                    </div>
                    <button class="copy-btn" id="copyBtn" onclick="copyText()">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" />
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                        </svg>
                        Copy
                    </button>
                </div>
                <div class="output-box" id="output"></div>
                <div class="stats-row" id="statsRow" style="display:none">
                    <div class="stat">chars: <span id="charCount">0</span></div>
                    <div class="stat">words: <span id="wordCount">0</span></div>
                    <div class="stat">lines: <span id="lineCount">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Drag-over style
        const dz = document.getElementById('dropzone');
        dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
        dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
        dz.addEventListener('drop', () => dz.classList.remove('dragover'));

        function toggleKey() {
            const inp = document.getElementById('apiKey');
            const icon = document.getElementById('eyeIcon');
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
            } else {
                inp.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            }
        }

        function onFileChange(input) {
            const file = input.files[0];
            if (!file) return;
            document.getElementById('fileSelected').classList.add('show');
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatBytes(file.size);
        }

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        async function extractTextFromImage(imageFile, apiKey, model, taskType, maxTokens, temperature, topP, repetitionPenalty, pages = null) {
            const formData = new FormData();
            formData.append('file', imageFile);
            formData.append('model', model);
            formData.append('task_type', taskType);
            formData.append('max_tokens', maxTokens.toString());
            formData.append('temperature', temperature.toString());
            formData.append('top_p', topP.toString());
            formData.append('repetition_penalty', repetitionPenalty.toString());
            if (pages) formData.append('pages', JSON.stringify(pages));

            const response = await fetch('https://api.opentyphoon.ai/v1/ocr', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}` },
                body: formData,
            });

            if (!response.ok) {
                const err = await response.text();
                throw new Error(`HTTP ${response.status}: ${err}`);
            }

            const result = await response.json();
            const extractedTexts = [];

            for (const pageResult of result.results || []) {
                if (pageResult.success && pageResult.message) {
                    let content = pageResult.message.choices[0].message.content;
                    try {
                        const parsed = JSON.parse(content);
                        content = parsed.natural_text || content;
                    } catch (e) { }
                    extractedTexts.push(content);
                } else if (!pageResult.success) {
                    console.error(`Error on ${pageResult.filename || 'unknown'}: ${pageResult.error}`);
                }
            }

            return extractedTexts.join('\n');
        }

        async function run() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const imageFile = document.getElementById('imageInput').files[0];
            const output = document.getElementById('output');
            const btn = document.getElementById('runBtn');
            const section = document.getElementById('outputSection');
            const statsRow = document.getElementById('statsRow');
            const dot = document.getElementById('outputDot');

            if (!apiKey || !imageFile) {
                showError('Please provide both an API key and a file.');
                return;
            }

            // Loading state
            btn.disabled = true;
            btn.classList.add('loading');
            btn.querySelector('.btn-text').textContent = 'Processing…';
            section.classList.add('show');
            output.className = 'output-box';
            output.textContent = 'Sending to Typhoon OCR…';
            statsRow.style.display = 'none';
            dot.style.background = 'var(--muted)';
            dot.style.boxShadow = 'none';

            try {
                const text = await extractTextFromImage(
                    imageFile, apiKey, 'typhoon-ocr', 'default',
                    16384, 0.1, 0.6, 1
                );
                output.textContent = text;
                dot.style.background = 'var(--accent2)';
                dot.style.boxShadow = '0 0 8px var(--accent2)';

                // Stats
                statsRow.style.display = 'flex';
                document.getElementById('charCount').textContent = text.length.toLocaleString();
                document.getElementById('wordCount').textContent = text.trim().split(/\s+/).filter(Boolean).length.toLocaleString();
                document.getElementById('lineCount').textContent = text.split('\n').length.toLocaleString();
            } catch (err) {
                output.textContent = err.message;
                output.classList.add('error');
                dot.style.background = 'var(--danger)';
                dot.style.boxShadow = '0 0 8px var(--danger)';
            } finally {
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.querySelector('.btn-text').textContent = 'Extract Text';
            }
        }

        function showError(msg) {
            const section = document.getElementById('outputSection');
            const output = document.getElementById('output');
            section.classList.add('show');
            output.textContent = msg;
            output.className = 'output-box error';
        }

        function copyText() {
            const text = document.getElementById('output').textContent;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.classList.add('copied');
                btn.querySelector('svg').innerHTML = '<polyline points="20 6 9 17 4 12"/>';
                btn.childNodes[1].textContent = ' Copied!';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.querySelector('svg').innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>';
                    btn.childNodes[1].textContent = ' Copy';
                }, 2000);
            });
        }
    </script>
</body>

</html>
